name: Build WeChat MP Tools Executables

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # 支持在 GitHub 页面上点击按钮手动触发打包

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ms-playwright
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
          pip install pyinstaller -i https://pypi.tuna.tsinghua.edu.cn/simple
          python -m playwright install chromium chromium-headless-shell

      - name: Build Windows EXE
        run: |
          pyinstaller wechat_mp_tools.spec

      - name: Compress Build Result
        shell: powershell
        run: |
          Compress-Archive -Path "dist\WeChat MP Tools" -DestinationPath WeChat_MP_Tools_Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeChat-MP-Tools-Windows-Executable
          path: WeChat_MP_Tools_Windows.zip
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ms-playwright
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
          pip install pyinstaller -i https://pypi.tuna.tsinghua.edu.cn/simple
          python -m playwright install chromium chromium-headless-shell

      - name: Build macOS APP
        run: |
          pyinstaller wechat_mp_tools.spec
          codesign --force --deep --sign - "dist/WeChat MP Tools.app"

      - name: Compress Build Result
        run: |
          cd dist
          ditto -c -k --keepParent "WeChat MP Tools.app" ../WeChat_MP_Tools_macOS.zip

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeChat-MP-Tools-macOS-Executable
          path: WeChat_MP_Tools_macOS.zip
          retention-days: 7
