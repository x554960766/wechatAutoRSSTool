name: Build WeChat MP Tools Executables

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # 支持在 GitHub 页面上点击按钮手动触发打包

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ms-playwright
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
          pip install pyinstaller -i https://pypi.tuna.tsinghua.edu.cn/simple
          python -m playwright install chromium --no-shell

      - name: Download WebView2 Evergreen Bootstrapper
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path webview2_bootstrapper
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "webview2_bootstrapper\MicrosoftEdgeWebview2Setup.exe"
          Write-Host "WebView2 Bootstrapper downloaded: $((Get-Item 'webview2_bootstrapper\MicrosoftEdgeWebview2Setup.exe').Length) bytes"

      - name: Build Windows EXE (Full)
        run: |
          pyinstaller --clean --noconfirm wechat_mp_tools.spec

      - name: Compress Windows Full Build
        shell: powershell
        run: |
          Compress-Archive -Path "dist\WeChat MP Tools" -DestinationPath WeChat_MP_Tools_Windows_Full.zip

      - name: Build Windows EXE (Lite)
        shell: powershell
        run: |
          Remove-Item -Recurse -Force build, dist
          $env:WECHAT_MP_TOOLS_BUNDLE_BROWSER="0"
          pyinstaller --clean --noconfirm wechat_mp_tools.spec

      - name: Compress Windows Lite Build
        shell: powershell
        run: |
          Compress-Archive -Path "dist\WeChat MP Tools" -DestinationPath WeChat_MP_Tools_Windows_Lite.zip

      - name: Upload Windows Full Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeChat-MP-Tools-Windows-Full
          path: WeChat_MP_Tools_Windows_Full.zip
          retention-days: 7

      - name: Upload Windows Lite Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeChat-MP-Tools-Windows-Lite
          path: WeChat_MP_Tools_Windows_Lite.zip
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ms-playwright
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
          pip install pyinstaller -i https://pypi.tuna.tsinghua.edu.cn/simple
          python -m playwright install chromium --no-shell

      - name: Build macOS APP (Full)
        run: |
          pyinstaller --clean --noconfirm wechat_mp_tools.spec
          # codesign --deep often fails on nested Chromium symlinks. If it fails, we ignore it as PyInstaller's built-in ad-hoc signing is sufficient.
          codesign --force --deep --sign - "dist/WeChat MP Tools.app" || true

      - name: Compress macOS Full Build
        run: |
          cd dist
          ditto -c -k --keepParent "WeChat MP Tools.app" ../WeChat_MP_Tools_macOS_Full.zip

      - name: Build macOS APP (Lite)
        run: |
          rm -rf build dist
          WECHAT_MP_TOOLS_BUNDLE_BROWSER=0 pyinstaller --clean --noconfirm wechat_mp_tools.spec
          codesign --force --deep --sign - "dist/WeChat MP Tools.app" || true

      - name: Compress macOS Lite Build
        run: |
          cd dist
          ditto -c -k --keepParent "WeChat MP Tools.app" ../WeChat_MP_Tools_macOS_Lite.zip

      - name: Upload macOS Full Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeChat-MP-Tools-macOS-Full
          path: WeChat_MP_Tools_macOS_Full.zip
          retention-days: 7

      - name: Upload macOS Lite Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeChat-MP-Tools-macOS-Lite
          path: WeChat_MP_Tools_macOS_Lite.zip
          retention-days: 7

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "1.0"
          name: "WeChat MP Tools v1.0"
          draft: false
          prerelease: false
          files: |
            artifacts/WeChat-MP-Tools-Windows-Full/WeChat_MP_Tools_Windows_Full.zip
            artifacts/WeChat-MP-Tools-Windows-Lite/WeChat_MP_Tools_Windows_Lite.zip
            artifacts/WeChat-MP-Tools-macOS-Full/WeChat_MP_Tools_macOS_Full.zip
            artifacts/WeChat-MP-Tools-macOS-Lite/WeChat_MP_Tools_macOS_Lite.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
